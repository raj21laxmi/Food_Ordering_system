<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Foodies Hub{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('/media/menu_images/back2.jpg'); /* Replace with your image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: #000;
        }

        .navbar {
            background-color: rgba(255, 87, 34, 0.85) !important;
        }

        .container {
            margin-top: 30px;
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
        }

        footer {
            text-align: center;
            padding: 15px 0;
            margin-top: 40px;
            background-color: rgba(255, 87, 34, 0.85);
            color: #000;
            border-radius: 10px;
        }

        .card {
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
            height: 100%; /* make all cards same height */
            display: flex;
            flex-direction: column;
        }

        .card img {
            object-fit: cover; /* image fills the card top */
            height: 200px; /* fixed height for all images */
            width: 100%;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .card-body {
            flex-grow: 1; /* ensures cards stretch to same height */
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1, h2, h3 {
            color: #ffd180;
            text-shadow: 2px 2px 4px #000;
        }

        .btn-custom {
            background-color: #ff7043;
            color: #000;
            font-weight: 600;
        }

        .btn-custom:hover {
            background-color: #d84315;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark rounded mb-4">
            <a class="navbar-brand" href="/">🍴 Foodies Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'signup' %}">Sign Up</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'menu' %}">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'order_page' %}">Order</a></li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        {% block content %}{% endblock %}

        <!-- Footer -->
        <footer>
            🍴 Foodies Hub © 2025 | Made with ❤️
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
