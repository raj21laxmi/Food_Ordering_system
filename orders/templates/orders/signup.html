{% extends "base.html" %}

{% block title %}Signup - Foodies Hub{% endblock %}

{% block content %}
<div class="col-md-6 offset-md-3">
    <h2 class="text-center mb-4">Create Account</h2>
    <form method="POST" class="p-4 rounded shadow" style="background-color: rgba(255,255,255,0.1);">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-custom w-100">Signup</button>
    </form>
    <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}" class="text-warning">Login</a></p>
</div>
{% endblock %}
